apiVersion: apps/v1
kind: Deployment
metadata:
  name: storemaker
  namespace: default
  labels:
    app: storemaker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: storemaker
  template:
    metadata:
      labels:
        app: storemaker
    spec:
      containers:
        - name: storemaker
          image: ghcr.io/apsferreira/storemaker:latest
          imagePullPolicy: IfNotPresent # BKL-1016: evita rollout não intencional com :latest
          ports:
            - containerPort: 3080
              protocol: TCP
          env:
            - name: ENV
              value: "production"
            - name: PORT
              value: "3080"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: storemaker-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: storemaker-secrets
                  key: JWT_SECRET
            - name: CORS_ORIGINS
              value: "https://storemaker.institutoitinerante.com.br"
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3080
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3080
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      restartPolicy: Always
